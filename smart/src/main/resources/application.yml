server:
  port: 8081

spring:
  application:
    name: smart-inventory

# Documentación OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
  show-actuator: false

# Configuración de inventario (Nuestros umbrales para el Strategy)
inventario:
  stock:
    minimo: 10
    critico: 3